name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit
        run: npm audit --audit-level=high

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build
